<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCSE Pythagoras - Edexcel Foundation</title>
    <style>
        /* Force everything to stay within the viewport */
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            background: linear-gradient(135deg, #d4af37 0%, #1b5e20 100%);
            font-family: 'Arial Black', sans-serif;
            overflow: hidden; /* Prevents the whole page from scrolling */
        }

        /* Timer Bar - Centered at the top */
        .timer-bar {
            flex: 0 0 auto;
            background: rgba(0, 0, 0, 0.9); color: white; 
            padding: 10px 30px; margin: 10px auto;
            border-radius: 50px; display: flex; align-items: center;
            gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 10;
        }
        #timer-display { font-size: 2.5rem; font-weight: bold; font-family: monospace; min-width: 120px; text-align: center; color: #f1c40f; }
        .timer-btn { background: #d4af37; border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }

        /* Main Container - Responsive Heights */
        .container {
            flex: 1; /* Takes up remaining space */
            width: 96vw; margin: 0 auto 10px auto;
            background-color: #fafaf8; border-radius: 20px;
            display: grid; grid-template-columns: 1.2fr 0.8fr;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Left Side: Problem Section */
        .problem-section { 
            padding: 20px; display: flex; flex-direction: column; 
            align-items: center; justify-content: space-evenly; 
            background: white; border-right: 2px solid #eee;
        }
        
        .triangle-container {
            position: relative; width: 260px; height: 160px; margin: 20px 0;
            border-bottom: 8px solid #333; border-left: 8px solid #333;
        }
        .hypotenuse-line {
            position: absolute; top: 0; left: 0; width: 310px; height: 8px;
            background: #333; transform: rotate(31.5deg); transform-origin: 0 0;
        }
        .label { position: absolute; font-size: 2rem; color: #1b5e20; font-weight: 900; }
        .label-a { left: -50px; top: 40%; }
        .label-b { bottom: -50px; left: 45%; }
        .label-c { right: -30px; top: 30%; }

        .level-select button { padding: 10px 15px; font-size: 0.9rem; margin: 2px; cursor: pointer; border: none; border-radius: 8px; background: #1b5e20; color: white; font-weight: bold; }

        input { width: 130px; padding: 8px; font-size: 1.8rem; border: 4px solid #d4af37; border-radius: 10px; text-align: center; font-weight: bold; }
        .action-btn { padding: 15px; font-size: 1.5rem; background: #1b5e20; color: white; border: none; border-radius: 10px; cursor: pointer; width: 80%; font-weight: bold; }

        /* Right Side: Help Section */
        .help-section { padding: 20px; background-color: #f4f4f2; display: flex; flex-direction: column; overflow-y: auto; }
        .instruction-step { background: white; border-left: 8px solid #d4af37; padding: 12px; margin: 6px 0; font-size: 1.1rem; }
        
        #feedback { font-size: 2rem; font-weight: 900; min-height: 2.5rem; text-align: center; margin-top: 10px; }
        .reveal-btn { background: #444; color: white; border: none; padding: 10px; margin-top: 8px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        
        .times-up { color: #ff0000 !important; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="timer-bar">
        <button class="timer-btn" onclick="adjustTimer(-30)">- 30s</button>
        <div id="timer-display">02:00</div>
        <button class="timer-btn" onclick="adjustTimer(30)">+ 30s</button>
        <button class="timer-btn" id="start-pause-btn" onclick="toggleTimer()" style="background: #27ae60;">START</button>
        <button class="timer-btn" onclick="resetTimer()" style="background: #c0392b;">RESET</button>
    </div>

    <div class="container">
        <div class="problem-section">
            <div class="level-select">
                <button onclick="generateProblem(1)">LEVEL 1: Find C</button>
                <button onclick="generateProblem(2)">LEVEL 2: Find B</button>
                <button onclick="generateProblem(3)">LEVEL 3: Find A</button>
            </div>

            <div class="triangle-container">
                <div class="hypotenuse-line"></div>
                <div id="sideA" class="label label-a">a</div>
                <div id="sideB" class="label label-b">b</div>
                <div id="sideC" class="label label-c">c</div>
            </div>

            <div style="font-size: 1.5rem;">
                Side = <input type="number" id="userAns" step="0.1">
            </div>
            
            <button class="action-btn" onclick="checkAnswer()">CHECK ANSWER</button>
            <div id="feedback"></div>
        </div>

        <div class="help-section">
            <h2 style="color: #1b5e20; border-bottom: 2px solid #d4af37; font-size: 1.5rem; margin: 0;">Method</h2>
            <div class="instruction-step">1. <b>Square:</b> Number x itself.</div>
            <div class="instruction-step">2. <b>+/- :</b> Finding C? Add. Finding A or B? Subtract.</div>
            <div class="instruction-step">3. <b>Root:</b> Square root the result.</div>

            <button class="reveal-btn" onclick="toggleHint()">Show Hint</button>
            <div id="hint-display" class="instruction-step" style="border-color: #1b5e20; background: #e8f5e9; display: none;"></div>
            
            <button class="reveal-btn" onclick="toggleAnswer()">Reveal Answer</button>
            <div id="answer-display" class="instruction-step" style="background: #fff3cd; display: none;"></div>
        </div>
    </div>

<script>
    let correctAns = 0;
    let timeLeft = 120;
    let timerId = null;

    function updateTimerDisplay() {
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer-display').innerText = mins.toString().padStart(2, '0') + ":" + secs.toString().padStart(2, '0');
    }

    function toggleTimer() {
        const btn = document.getElementById('start-pause-btn');
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
            btn.innerText = "START";
            btn.style.background = "#27ae60";
        } else {
            btn.innerText = "PAUSE";
            btn.style.background = "#f39c12";
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerId);
                    document.getElementById('timer-display').classList.add('times-up');
                }
            }, 1000);
        }
    }

    function adjustTimer(amount) {
        timeLeft = Math.max(0, timeLeft + amount);
        updateTimerDisplay();
    }

    function resetTimer() {
        clearInterval(timerId);
        timerId = null;
        timeLeft = 120;
        document.getElementById('timer-display').classList.remove('times-up');
        document.getElementById('start-pause-btn').innerText = "START";
        document.getElementById('start-pause-btn').style.background = "#27ae60";
        updateTimerDisplay();
    }

    function generateProblem(level) {
        document.getElementById('feedback').innerText = "";
        document.getElementById('hint-display').style.display = "none";
        document.getElementById('answer-display').style.display = "none";
        document.getElementById('userAns').value = "";

        let a = Math.floor(Math.random() * 8) + 3;
        let b = Math.floor(Math.random() * 8) + 3;
        let cRaw = Math.sqrt(a*a + b*b);
        let cFormatted = parseFloat(cRaw.toFixed(1));

        if (level === 1) {
            document.getElementById('sideA').innerText = a;
            document.getElementById('sideB').innerText = b;
            document.getElementById('sideC').innerText = "?";
            correctAns = cFormatted;
            document.getElementById('hint-display').innerText = "Finding C? Square " + a + " and " + b + ", then ADD them.";
        } else if (level === 2) {
            document.getElementById('sideA').innerText = a;
            document.getElementById('sideC').innerText = cFormatted;
            document.getElementById('sideB').innerText = "?";
            correctAns = b.toFixed(1);
            document.getElementById('hint-display').innerText = "Finding B? Square " + cFormatted + " and " + a + ", then SUBTRACT.";
        } else {
            document.getElementById('sideB').innerText = b;
            document.getElementById('sideC').innerText = cFormatted;
            document.getElementById('sideA').innerText = "?";
            correctAns = a.toFixed(1);
            document.getElementById('hint-display').innerText = "Finding A? Square " + cFormatted + " and " + b + ", then SUBTRACT.";
        }
        document.getElementById('answer-display').innerText = "Answer: " + correctAns;
    }

    function checkAnswer() {
        let val = parseFloat(document.getElementById('userAns').value);
        let fb = document.getElementById('feedback');
        if (val == correctAns) { fb.innerText = "✅ CORRECT!"; fb.style.color = "green"; }
        else { fb.innerText = "❌ TRY AGAIN"; fb.style.color = "red"; }
    }

    function toggleHint() { let h = document.getElementById('hint-display'); h.style.display = h.style.display === "block" ? "none" : "block"; }
    function toggleAnswer() { let ad = document.getElementById('answer-display'); ad.style.display = ad.style.display === "block" ? "none" : "block"; }

    updateTimerDisplay();
    generateProblem(1);
</script>
</body>
</html>
